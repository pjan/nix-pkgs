name: Update package sources

on:
  schedule:
    - cron: '17 6 * * 1' # weekly, Monday 06:17 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run nvfetcher
        run: nix run nixpkgs#nvfetcher -- -c nvfetcher.toml

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: update package sources'
          title: 'chore: update package sources'
          body: Automated nvfetcher run — review version bumps before merging.
          branch: update/nvfetcher
          delete-branch: true
