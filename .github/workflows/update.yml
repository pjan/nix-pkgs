name: Update package sources

on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.24.11/install
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Run nvfetcher
        run: nix run nixpkgs#nvfetcher -- -c nvfetcher.toml

      - name: Open pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update package sources"
          title: "chore: update package sources"
          body: Automated nvfetcher run — review version bumps before merging.
          branch: update/nvfetcher
          delete-branch: true
